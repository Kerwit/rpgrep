# Configuración cargo-deny — auditoría de dependencias.
#   R1: pipeline puro Rust/CPU (sin deps prohibidas; se vigila por revisión + bans).
#   R9: el crate es MIT OR Apache-2.0 → solo deps con licencias compatibles.
# Ejecutado en CI por EmbarkStudios/cargo-deny-action@v2.

[graph]
all-features = true

[licenses]
# Allow-list derivada del árbol real de dependencias (cargo metadata).
# Las expresiones SPDX "A OR B" pasan si CUALQUIER licencia listada las satisface.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Zlib",
    "Unlicense",
    "CC0-1.0",
]
confidence-threshold = 0.8

[advisories]
# Falla ante crates retirados (yanked) o con vulnerabilidades conocidas (RUSTSEC).
yanked = "deny"
ignore = [
    # RUSTSEC-2025-0141: bincode quedó sin mantenimiento (el equipo cesó el
    # desarrollo; por eso la 3.0 es un tombstone que no compila). Es advisory
    # "unmaintained", NO vulnerabilidad, y bincode es dev-only: baseline
    # histórico v0.1 en benches/pipeline.rs::bench_load, sin exposición en
    # runtime. Aceptado conscientemente.
    "RUSTSEC-2025-0141",
]

[bans]
# Versiones duplicadas: solo aviso (xorf arrastra rand 0.8 además de nuestro 0.10).
multiple-versions = "warn"
wildcards = "deny"

[sources]
# Solo crates.io: ninguna fuente git/registry desconocida (refuerza R1).
unknown-registry = "deny"
unknown-git = "deny"
