name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    # Build nocturno: detecta roturas por updates de toolchain/deps aunque no haya commits.
    - cron: '00 01 * * *'

# Permisos mínimos: solo leer el repo (checkout).
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Test matrix: 3 SO × {stable, beta}. tree-sitter compila C vía cc en cada SO. ──
  test:
    name: test / ${{ matrix.rust }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, beta]
    steps:
      - uses: actions/checkout@v4
      - name: Instalar toolchain ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - name: Build (todos los targets)
        run: cargo build --all-targets --verbose
      - name: Test
        # El gate p95 (#[ignore]) es pesado (corpus 100k) y corre en su propio job.
        run: cargo test --verbose

  # ── MSRV: solo lib+bin (producción). NO --all-targets: criterion (dev) exige 1.86. ──
  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --lib --bins --verbose

  # ── Gate de latencia: P95 < 150 ms @ 100k chunks (test #[ignore], requiere --release). ──
  p95-gate:
    name: gate P95 (100k chunks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --release --test p95_gate -- --ignored --nocapture

  rustfmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy (-D warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  docs:
    name: docs (rustdoc -D warnings)
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps --document-private-items

  # ── Auditoría de deps: R1 (sin deps prohibidas) + R9 (licencias compatibles). ──
  deny:
    name: cargo-deny (licencias + advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses advisories bans sources
